<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autentisering och säkerhet</title>
  </head>

  <body>
    <div id="app">
      <h1>Autentisering och säkerhet - registrering och inloggning</h1>

      <section>
        <h2>Registrera</h2>

        <form id="registerForm">
          <input type="text" id="registerUsername" placeholder="Användarnamn" required/>
          <input type="password" id="registerPassword" placeholder="Lösenord" required/>
          <button type="submit">Registrera</button>
        </form>
      </section>

      <section>
        <h2>Logga in</h2>

        <form id="loginForm">
          <input type="text" id="loginUsername" placeholder="Användarnamn" required/>
          <input type="password" id="loginPassword" placeholder="Lösenord" required/>
          <button type="submit">Logga in</button>
        </form>
      </section>

      <p id="message"></p>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
